name: AMP CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  typescript-build:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis/redis-stack-server:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js 18.x
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
        cache: 'npm'
    - run: npm ci
    - run: npm run build
    - name: Run TS Tests
      run: npm run test
      env:
        REDIS_URL: redis://localhost:6379

  python-build:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis/redis-stack-server:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest pytest-asyncio pydantic redis
        pip install -e ./python
    - name: Lint with flake8
      run: |
        flake8 python/amp --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 python/amp --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics
    - name: Run Python Tests
      run: PYTHONPATH=python pytest python/tests/
      env:
        REDIS_URL: redis://localhost:6379
